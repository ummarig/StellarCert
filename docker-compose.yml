services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: stellarcert_db
    environment:
      POSTGRES_DB: stellarwave
      POSTGRES_USER: stellarwave_user
      POSTGRES_PASSWORD: stellarwave_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/migrations:/docker-entrypoint-initdb.d/migrations
    networks:
      - stellarcert_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stellarwave_user -d stellarwave"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis (used by BullMQ job queues)
  redis:
    image: redis:7-alpine
    container_name: stellarcert_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - stellarcert_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: stellarcert_backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: stellarwave_user
      DB_PASSWORD: stellarwave_password
      DB_NAME: stellarwave
      REDIS_URL: redis://redis:6379
      STELLAR_NETWORK: TESTNET
      STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
      STELLAR_ISSUER_SECRET_KEY: ${STELLAR_ISSUER_SECRET_KEY:-}
      STELLAR_ISSUER_PUBLIC_KEY: ${STELLAR_ISSUER_PUBLIC_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-3600}
      ALLOWED_ORIGINS: http://localhost:5173,http://frontend:5173
      CORS_ORIGIN: http://localhost:5173,http://frontend:5173
      LOG_LEVEL: info
      SENTRY_DSN: ${SENTRY_DSN:-}
      METRICS_ENABLED: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stellarcert_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stellarcert_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000/api
      VITE_STELLAR_NETWORK: TESTNET
      VITE_HORIZON_URL: https://horizon-testnet.stellar.org
      VITE_ENABLE_NOTIFICATIONS: true
      VITE_ENABLE_METRICS: true
    depends_on:
      - backend
    networks:
      - stellarcert_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Nginx Reverse Proxy (Optional - for production)
  nginx:
    image: nginx:alpine
    container_name: stellarcert_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - stellarcert_network
    restart: unless-stopped
    profiles:
      - production

  # Prometheus (Optional - for monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: stellarcert_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=200h"
      - "--web.enable-lifecycle"
    networks:
      - stellarcert_network
    restart: unless-stopped
    profiles:
      - monitoring

networks:
  stellarcert_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
